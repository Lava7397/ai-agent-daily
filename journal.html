<style>
/* 对齐 today.html：fixed 顶栏 + 同高占位；与当日刊 atlas-btn「返回」一致 */
:root {
  --ix: 0.18s ease;
  --issue-dock-row-h: 52px;
}
@media (hover: hover) and (pointer: fine) {
  a, button, .atlas-btn { -webkit-tap-highlight-color: transparent; }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #f5f0e8;
  color: #2c2c2c;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.detail-issue-top--fixed-dock {
  padding-top: calc(env(safe-area-inset-top, 0px) + var(--issue-dock-row-h));
}
.issue-sticky-dock {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  width: 100%;
  max-width: none;
  margin: 0;
  z-index: 200;
  box-sizing: border-box;
  padding-top: env(safe-area-inset-top, 0px);
  background: rgba(245,240,232,0.95);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border-bottom: 1px solid rgba(100,80,60,0.1);
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
}
.issue-sticky-dock .detail-topbar {
  max-width: 720px;
  margin: 0 auto;
  width: 100%;
  box-sizing: border-box;
}
.detail-topbar-inner--with-quicknav {
  padding: 6px 8px 6px 10px;
  min-height: 40px;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  flex-wrap: nowrap;
  gap: 6px;
}
.atlas-btn {
  flex-shrink: 0;
  border: 1px solid rgba(100,80,60,0.18);
  color: #4d4338;
  background: #f8f4eb;
  text-decoration: none;
  padding: 6px 10px;
  font-size: 10px;
  letter-spacing: 1.1px;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border-radius: 2px;
  cursor: pointer;
  transition: background var(--ix), color var(--ix), border-color var(--ix), box-shadow var(--ix), transform 0.12s ease;
}
.atlas-btn:hover {
  background: #efe6d8;
  border-color: rgba(100, 80, 60, 0.32);
  box-shadow: 0 1px 4px rgba(45, 36, 28, 0.08);
  transform: translateY(-1px);
}
.atlas-btn:active { transform: translateY(0); }
.atlas-btn:focus-visible { outline: 2px solid #98703f; outline-offset: 2px; }

.skip-link {
  position: absolute;
  top: -40px;
  left: 0;
  background: #5a6e8a;
  color: #fff;
  padding: 8px 16px;
  z-index: 1000;
  text-decoration: none;
  border-radius: 0 0 2px 0;
  transition: top 0.2s, background 0.15s, box-shadow 0.15s;
}
.skip-link:hover { background: #4a6080; box-shadow: 0 2px 8px rgba(74, 96, 128, 0.2); }
.skip-link:focus { top: 0; }
.skip-link:focus-visible { outline: 2px solid #2d3a4a; outline-offset: 2px; }

.journal-wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 16px 20px 48px;
}
.journal-entry.public-data {
  border: 1px solid rgba(100,80,60,0.12);
  background: rgba(255,255,255,0.55);
  padding: 12px 14px;
  margin-bottom: 10px;
  border-radius: 2px;
}
.journal-entry.public-data .journal-field + .journal-field {
  margin-top: 10px;
}
.journal-field-label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.04em;
  color: #5a5348;
  font-weight: 600;
  margin-bottom: 5px;
}
.journal-field-value {
  font-size: 14px;
  line-height: 1.55;
  color: #3a342c;
  word-break: break-word;
}
.journal-field-value.journal-field-value--muted {
  color: #9a9288;
}
.journal-entry.public-data a.entry-link {
  word-break: break-all;
  color: #4a6080;
  font-size: 14px;
}
.journal-entry.public-data time {
  font-size: 14px;
  font-variant-numeric: tabular-nums;
  color: #5a5048;
}
.journal-empty {
  text-align: center;
  padding: 28px 16px;
  color: #8a7e6e;
  font-size: 13px;
  line-height: 1.6;
}

<body>
<a href="#main-content" class="skip-link">跳到正文</a>
<div class="detail-issue-top detail-issue-top--fixed-dock">
  <header class="issue-sticky-dock" aria-label="剪藏顶栏">
    <div class="detail-topbar">
      <div class="detail-topbar-inner detail-topbar-inner--with-quicknav">
        <a href="home.html" class="atlas-btn" id="back-home" aria-label="返回首页"><span aria-hidden="true">←</span> <span>返回</span></a>
      </div>
    </div>
  </header>
  <main class="journal-wrap" id="main-content">
    <section id="timeline-public" aria-label="剪藏"></section>
  </main>
</div>
<script>
(function () {
  'use strict';

  const PUBLIC_JSON = '/journal-data.json';
  const elPublic = document.getElementById('timeline-public');

  function normalizePublicRows(list) {
    const out = [];
    if (!Array.isArray(list)) return out;
    for (let i = 0; i < list.length; i++) {
      const r = list[i];
      if (!r || !r.id || !r.createdAt) continue;
      out.push({
        id: String(r.id),
        createdAt: String(r.createdAt),
        url: r.url ? String(r.url).trim() : '',
        title: r.title ? String(r.title).trim() : '',
        text: r.text !== undefined && r.text !== null ? String(r.text) : '',
      });
    }
    return out;
  }

  async function fetchPublicEntries() {
    const res = await fetch(PUBLIC_JSON, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const list = Array.isArray(data.entries) ? data.entries : [];
    return normalizePublicRows(list);
  }

  function formatPublishTime(iso) {
    try {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '—';
      return new Intl.DateTimeFormat('zh-CN', {
        timeZone: 'Asia/Shanghai',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      }).format(d);
    } catch (_) {
      return '—';
    }
  }

  function makeField(labelText) {
    const wrap = document.createElement('div');
    wrap.className = 'journal-field';
    const lab = document.createElement('span');
    lab.className = 'journal-field-label';
    lab.textContent = labelText;
    wrap.appendChild(lab);
    return wrap;
  }

  function renderPublicEntry(row) {
    const art = document.createElement('article');
    art.className = 'journal-entry public-data';

    const fTitle = makeField('文章标题或链接');
    const valTitle = document.createElement('div');
    valTitle.className = 'journal-field-value';
    const u = row.url.trim();
    const t = row.title.trim();
    const txt = row.text.trim();
    if (u) {
      const a = document.createElement('a');
      a.href = u;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.className = 'entry-link';
      a.textContent = t || u;
      valTitle.appendChild(a);
    } else if (t) {
      valTitle.textContent = t;
    } else {
      valTitle.classList.add('journal-field-value--muted');
      valTitle.textContent = '—';
    }
    fTitle.appendChild(valTitle);
    art.appendChild(fTitle);

    const fBody = makeField('文章内容');
    const valBody = document.createElement('div');
    valBody.className = 'journal-field-value';
    if (txt) {
      valBody.style.whiteSpace = 'pre-wrap';
      valBody.textContent = txt;
    } else {
      valBody.classList.add('journal-field-value--muted');
      valBody.textContent = '—';
    }
    fBody.appendChild(valBody);
    art.appendChild(fBody);

    const fTime = makeField('发布时间');
    const valTime = document.createElement('div');
    valTime.className = 'journal-field-value';
    const timeEl = document.createElement('time');
    timeEl.dateTime = row.createdAt;
    timeEl.textContent = formatPublishTime(row.createdAt);
    valTime.appendChild(timeEl);
    fTime.appendChild(valTime);
    art.appendChild(fTime);

    return art;
  }

  function renderPublicTimeline(rows) {
    elPublic.innerHTML = '';
    rows = rows.slice().sort(function (a, b) {
      return new Date(b.createdAt) - new Date(a.createdAt);
    });
    if (!rows.length) {
      const empty = document.createElement('p');
      empty.className = 'journal-empty';
      empty.textContent = '内容为空';
      elPublic.appendChild(empty);
      return;
    }
    for (let i = 0; i < rows.length; i++) {
      elPublic.appendChild(renderPublicEntry(rows[i]));
    }
  }

  async function reloadPublicTimeline() {
    try {
      const rows = await fetchPublicEntries();
      renderPublicTimeline(rows);
    } catch (_) {
      elPublic.innerHTML = '';
      const hint = document.createElement('p');
      hint.className = 'journal-empty';
      hint.textContent = '加载失败，请检查网络后刷新页面。';
      elPublic.appendChild(hint);
    }
  }

  reloadPublicTimeline();
})();
</script>
<script>
(function () {
  var el = document.getElementById('back-home');
  if (!el) return;
  var p = location.pathname || '';
  if (p.indexOf('/archives/') !== -1) el.setAttribute('href', '../home.html');
})();
</script>
</body>

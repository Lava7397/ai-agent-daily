<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="剪藏">
<meta name="theme-color" content="#0d1b2a">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Lava's Aal izz well</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #f5f0e8;
  color: #2c2c2c;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.journal-nav {
  padding: 12px 20px;
  background: rgba(242, 237, 227, 0.96);
  border-bottom: 1px solid rgba(100, 80, 60, 0.12);
}
.journal-nav a {
  color: #5a6e8a;
  text-decoration: none;
  font-size: 13px;
}
.journal-nav a:hover { color: #2f2c27; text-decoration: underline; }
.journal-wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 16px 20px 48px;
}
.journal-entry.public-data {
  border: 1px solid rgba(100,80,60,0.12);
  background: rgba(255,255,255,0.55);
  padding: 12px 14px;
  margin-bottom: 10px;
  border-radius: 2px;
}
.journal-entry.public-data .journal-field + .journal-field {
  margin-top: 10px;
}
.journal-field-label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.04em;
  color: #5a5348;
  font-weight: 600;
  margin-bottom: 5px;
}
.journal-field-value {
  font-size: 14px;
  line-height: 1.55;
  color: #3a342c;
  word-break: break-word;
}
.journal-field-value.journal-field-value--muted {
  color: #9a9288;
}
.journal-entry.public-data a.entry-link {
  word-break: break-all;
  color: #4a6080;
  font-size: 14px;
}
.journal-entry.public-data time {
  font-size: 14px;
  font-variant-numeric: tabular-nums;
  color: #5a5048;
}
.journal-empty {
  text-align: center;
  padding: 28px 16px;
  color: #8a7e6e;
  font-size: 13px;
  line-height: 1.6;
}
</style>
</head>
<body>
<nav class="journal-nav" aria-label="页面导航">
  <a href="home.html">← 返回首页</a>
</nav>
<main class="journal-wrap">
  <section id="timeline-public" aria-label="剪藏"></section>
</main>
<script>
(function () {
  'use strict';

  const PUBLIC_JSON = '/journal-data.json';
  const elPublic = document.getElementById('timeline-public');

  function normalizePublicRows(list) {
    const out = [];
    if (!Array.isArray(list)) return out;
    for (let i = 0; i < list.length; i++) {
      const r = list[i];
      if (!r || !r.id || !r.createdAt) continue;
      out.push({
        id: String(r.id),
        createdAt: String(r.createdAt),
        url: r.url ? String(r.url).trim() : '',
        title: r.title ? String(r.title).trim() : '',
        text: r.text !== undefined && r.text !== null ? String(r.text) : '',
      });
    }
    return out;
  }

  async function fetchPublicEntries() {
    const res = await fetch(PUBLIC_JSON, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const list = Array.isArray(data.entries) ? data.entries : [];
    return normalizePublicRows(list);
  }

  function formatPublishTime(iso) {
    try {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '—';
      return new Intl.DateTimeFormat('zh-CN', {
        timeZone: 'Asia/Shanghai',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      }).format(d);
    } catch (_) {
      return '—';
    }
  }

  function makeField(labelText) {
    const wrap = document.createElement('div');
    wrap.className = 'journal-field';
    const lab = document.createElement('span');
    lab.className = 'journal-field-label';
    lab.textContent = labelText;
    wrap.appendChild(lab);
    return wrap;
  }

  function renderPublicEntry(row) {
    const art = document.createElement('article');
    art.className = 'journal-entry public-data';

    const fTitle = makeField('文章标题或链接');
    const valTitle = document.createElement('div');
    valTitle.className = 'journal-field-value';
    const u = row.url.trim();
    const t = row.title.trim();
    const txt = row.text.trim();
    if (u) {
      const a = document.createElement('a');
      a.href = u;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.className = 'entry-link';
      a.textContent = t || u;
      valTitle.appendChild(a);
    } else if (t) {
      valTitle.textContent = t;
    } else {
      valTitle.classList.add('journal-field-value--muted');
      valTitle.textContent = '—';
    }
    fTitle.appendChild(valTitle);
    art.appendChild(fTitle);

    const fBody = makeField('文章内容');
    const valBody = document.createElement('div');
    valBody.className = 'journal-field-value';
    if (txt) {
      valBody.style.whiteSpace = 'pre-wrap';
      valBody.textContent = txt;
    } else {
      valBody.classList.add('journal-field-value--muted');
      valBody.textContent = '—';
    }
    fBody.appendChild(valBody);
    art.appendChild(fBody);

    const fTime = makeField('发布时间');
    const valTime = document.createElement('div');
    valTime.className = 'journal-field-value';
    const timeEl = document.createElement('time');
    timeEl.dateTime = row.createdAt;
    timeEl.textContent = formatPublishTime(row.createdAt);
    valTime.appendChild(timeEl);
    fTime.appendChild(valTime);
    art.appendChild(fTime);

    return art;
  }

  function renderPublicTimeline(rows) {
    elPublic.innerHTML = '';
    rows = rows.slice().sort(function (a, b) {
      return new Date(b.createdAt) - new Date(a.createdAt);
    });
    if (!rows.length) {
      const empty = document.createElement('p');
      empty.className = 'journal-empty';
      empty.textContent = '内容为空';
      elPublic.appendChild(empty);
      return;
    }
    for (let i = 0; i < rows.length; i++) {
      elPublic.appendChild(renderPublicEntry(rows[i]));
    }
  }

  async function reloadPublicTimeline() {
    try {
      const rows = await fetchPublicEntries();
      renderPublicTimeline(rows);
    } catch (_) {
      elPublic.innerHTML = '';
      const hint = document.createElement('p');
      hint.className = 'journal-empty';
      hint.textContent = '加载失败，请检查网络后刷新页面。';
      elPublic.appendChild(hint);
    }
  }

  reloadPublicTimeline();
})();
</script>
</body>
</html>

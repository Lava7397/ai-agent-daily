/* 可交互元素统一动效（简洁） */
:root { --ix: 0.18s ease; }
@media (hover: hover) and (pointer: fine) {

}

.atlas-nav-sticky {

  top: 0;
  z-index: 100;
  background: rgba(242, 237, 227, 0.96);

  border-bottom: 1px solid rgba(100, 80, 60, 0.12);
}

.atlas-shell {

  background: #f2ede3;
}
.atlas-nav {
  max-width: 1120px;

  padding: 14px 24px;

}
.atlas-brand-row {

}
.atlas-brand {

}
/* 顶栏：复制、比心 */
.atlas-nav-icon-actions {
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.atlas-copy-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 4px;
  border: none;
  background: transparent;
  color: #6f6559;
  cursor: pointer;
  border-radius: 4px;
  line-height: 0;
  transition: color var(--ix), background var(--ix), transform 0.12s ease;
}
.atlas-copy-btn:hover {
  color: #2f2c27;
  background: rgba(100, 80, 60, 0.08);
  transform: scale(1.06);
}
.atlas-copy-btn:active { transform: scale(0.98); }
/* 仅复制：更明显的按压感 */
.atlas-copy-btn:active {
  transform: scale(0.88);
  background: rgba(55, 95, 72, 0.26);
  color: #1a3d28;
}
.atlas-copy-btn .atlas-copy-icon {
  display: block;
  transform-origin: center;
  transition: transform 0.15s ease, color 0.15s ease;
}
.atlas-copy-btn:focus-visible {
  outline: 2px solid #98703f;
  outline-offset: 2px;
}
@keyframes atlas-copy-ok {
  0% { transform: scale(0.85) rotate(-6deg); }
  45% { transform: scale(1.14) rotate(4deg); }
  100% { transform: scale(1) rotate(0deg); }
}
.atlas-copy-btn--flash .atlas-copy-icon {
  animation: atlas-copy-ok 0.5s cubic-bezier(0.34, 1.25, 0.64, 1) both;
}
@media (prefers-reduced-motion: reduce) {
  .atlas-copy-btn:active {
    transform: scale(0.96);
  }
  .atlas-copy-btn--flash .atlas-copy-icon {
    animation: none;
  }
}
.atlas-fav-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 2px 4px;
  border: none;
  background: transparent;
  color: #6f6559;
  cursor: pointer;
  border-radius: 6px;
  line-height: 0;
  position: relative;
  transition: background var(--ix), transform 0.12s ease;
  -webkit-tap-highlight-color: transparent;
}
.atlas-fav-btn:hover {
  background: rgba(100, 80, 60, 0.08);
}
.atlas-fav-btn:not(.atlas-fav-btn--on):hover .atlas-fav-img {
  filter: grayscale(0.12) saturate(0.95) contrast(0.98) brightness(1) drop-shadow(0 1px 1px rgba(0, 0, 0, 0.1));
  transform: scale(1.02);
}
.atlas-fav-btn--on:hover {
  background: rgba(196, 92, 106, 0.1);
}
.atlas-fav-btn--on:hover .atlas-fav-img {
  filter: saturate(1.12) drop-shadow(0 0 8px rgba(228, 80, 100, 0.5));
  transform: scale(1.06);
}
.atlas-fav-btn:active { transform: scale(0.96); }
.atlas-fav-btn:focus-visible {
  outline: 2px solid #98703f;
  outline-offset: 2px;
}
/* 内层不裁切，方便星星粒子溢出；真正裁图在 .atlas-fav-img-crop */
.atlas-fav-btn-inner {
  position: relative;
  display: inline-block;
  width: 24px;
  height: 24px;
  overflow: visible;
  pointer-events: none;
  flex: 0 0 auto;
}
/* 透明底图整图放入，不裁切（避免红心被切）；与导航条背景一致 */
.atlas-fav-img-crop {
  display: block;
  width: 24px;
  height: 24px;
  overflow: visible;
  background: transparent;
  line-height: 0;
}
.atlas-fav-img-crop picture {
  display: block;
  width: 100%;
  height: 100%;
  line-height: 0;
}
/* 基类：contain 保完整；未点/已点由父级类决定 */
.atlas-fav-img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
  vertical-align: top;
  transition: filter 0.28s ease, transform 0.28s ease;
}
/* 默认 = 未点：保留肤色/层次，比已点更平、无粉光（首屏与未收藏一致） */
.atlas-fav-btn:not(.atlas-fav-btn--on) .atlas-fav-img {
  filter: grayscale(0.28) saturate(0.88) contrast(0.96) brightness(0.99) drop-shadow(0 1px 1px rgba(0, 0, 0, 0.08));
  transform: scale(0.98);
}
.atlas-fav-btn--on .atlas-fav-img {
  filter: saturate(1.15) drop-shadow(0 1px 2px rgba(0,0,0,0.12)) drop-shadow(0 0 8px rgba(230, 72, 95, 0.45));
  transform: scale(1);
}
.atlas-fav-btn--fx .atlas-fav-img {
  animation: fav-pop 0.72s cubic-bezier(0.28, 1.7, 0.48, 1);
}
.atlas-fav-btn--fx {
  animation: fav-ring 0.68s ease-out, fav-pulse-outer 0.75s ease-out 0.05s;
}
@keyframes fav-pop {
  0% { transform: scale(0.78) rotate(-2deg); }
  22% { transform: scale(1.28) rotate(-8deg); }
  45% { transform: scale(0.95) rotate(4deg); }
  70% { transform: scale(1.08) rotate(-3deg); }
  100% { transform: scale(1) rotate(0); }
}
@keyframes fav-ring {
  0% { box-shadow: 0 0 0 0 rgba(255, 120, 150, 0.65); }
  100% { box-shadow: 0 0 0 22px rgba(255, 100, 130, 0); }
}
@keyframes fav-pulse-outer {
  0% { filter: none; }
  40% { filter: drop-shadow(0 0 10px rgba(255, 190, 210, 0.85)); }
  100% { filter: none; }
}
.atlas-fav-spark {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 10px;
  height: 10px;
  margin: -5px 0 0 -5px;
  font-size: 9px;
  line-height: 10px;
  text-align: center;
  color: #e86b8a;
  opacity: 0;
  pointer-events: none;
  text-shadow: 0 0 4px rgba(255, 180, 200, 0.95);
  --tx: 0px;
  --ty: 0px;
}
.atlas-fav-spark--go {
  animation: fav-spark-fly 0.65s ease-out forwards;
}
@keyframes fav-spark-fly {
  0% { opacity: 0.95; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.35); }
}
/* 点击「喜欢」后往下掉的星星 */
.atlas-fav-star {
  position: absolute;
  left: 50%;
  top: 42%;
  width: 12px;
  height: 12px;
  margin-left: -6px;
  margin-top: -6px;
  font-size: 11px;
  line-height: 12px;
  text-align: center;
  pointer-events: none;
  z-index: 3;
  opacity: 0;
  color: #ffcf4a;
  text-shadow: 0 0 5px rgba(255, 220, 150, 1), 0 0 10px rgba(255, 180, 100, 0.55);
  --fall: 88px;
  --drift: 0px;
  --swing: 0deg;
  --delay: 0s;
}
.atlas-fav-star--fall {
  animation: fav-star-fall 1.15s cubic-bezier(0.2, 0.45, 0.35, 1) var(--delay, 0s) forwards;
}
@keyframes fav-star-fall {
  0% {
    opacity: 1;
    transform: translate(var(--x0, 0px), -4px) rotate(var(--swing, 0deg)) scale(1.15);
  }
  12% { opacity: 1; }
  100% {
    opacity: 0;
    transform: translate(calc(var(--x0, 0px) + var(--drift, 0px)), var(--fall, 88px)) rotate(calc(var(--swing, 0deg) + 200deg)) scale(0.35);
  }
}
@media (prefers-reduced-motion: reduce) {
  .atlas-fav-btn--fx,
  .atlas-fav-btn--fx .atlas-fav-img,
  .atlas-fav-spark--go,
  .atlas-fav-star--fall { animation: none; }
  .atlas-fav-spark--go { opacity: 0; }
  .atlas-fav-star--fall { opacity: 0; }
}

<header class="atlas-nav-sticky">
  <div class="atlas-nav">
    <div class="atlas-brand-row">
      <span class="atlas-brand" id="atlas-site-label">www.lava7397.com</span>

          <svg class="atlas-copy-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
        <button type="button" class="atlas-fav-btn" id="fav-site-url" aria-label="喜欢本网站" title="点一颗爱心" aria-pressed="false">
          <span class="atlas-fav-btn-inner" aria-hidden="true">

function getLang() {

function getLatestIssueHref() {
  // 与 /today.html 统一：由 generate 将「最新一期归档」同步到 today.html，避免
  // daily_data 日期滞后时，直链 /today.html 与「今日刊」分别指向 4/23 与 4/24。
  return 'today.html';

function syncTodayLinks() {

  document.querySelectorAll('[data-role="today-issue-link"]').forEach(el => {
    el.setAttribute('href', href);
  });

/**
 * file:// 下浏览器通常禁止 fetch 本地 JSON；用线上地址（CORS *）。
 * apex → www 308 的内嵌浏览器同上。
 */
function journalDataJsonUrl() {
  if (location.protocol === 'file:') {
    return 'https://www.lava7397.com/journal-data.json';
  }
  if (location.hostname === 'lava7397.com') {
    return 'https://www.lava7397.com/journal-data.json';
  }
  return new URL('journal-data.json', location.href).href;
}

/** 拉取 journal-data.json，在第二卡片展示最新一条标题或链接（非静态写死） */
function normalizeJournalRow(r) {
  if (!r || !r.id || !r.createdAt) return null;
  return {
    id: String(r.id),
    createdAt: String(r.createdAt),
    url: (r.url || '').trim(),
    title: (r.title || '').trim(),
    text: r.text != null ? String(r.text) : '',
  };
}

/** 仅取最新一条标题或链接，避免长文与相对路径问题 */
function pickLatestJournalHeadline(entry) {
  const title = (entry.title || '').trim();
  const url = (entry.url || '').trim();
  return title || url || '';
}

async function refreshJournalRecommendTeaser() {
  const el = document.getElementById('journal-recommend-summary');
  if (!el) return;
  const lang = getLang();
  const pack = I18N[lang];
  el.classList.remove('atlas-recommend-teaser--muted');
  el.textContent = pack.journal_teaser_loading;

  try {
    const res = await fetch(journalDataJsonUrl(), { credentials: 'omit' });
    if (!res.ok) throw new Error('http');
    const data = await res.json();
    const list = Array.isArray(data.entries) ? data.entries.map(normalizeJournalRow).filter(Boolean) : [];
    list.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    const top = list[0];
    if (!top) {
      el.classList.add('atlas-recommend-teaser--muted');
      el.textContent = pack.journal_teaser_empty;
      return;
    }
    const summary = pickLatestJournalHeadline(top);
    if (!summary) {
      el.classList.add('atlas-recommend-teaser--muted');
      el.textContent = pack.journal_teaser_empty;
      return;
    }
    el.textContent = summary;
  } catch (e) {
    el.classList.add('atlas-recommend-teaser--muted');
    el.textContent = pack.journal_teaser_failed;
  }
}

function setSiteLastUpdatedDisplay() {
  const el = document.getElementById('site-last-updated');
  if (!el) return;
  const d = new Date(document.lastModified);
  if (isNaN(d.getTime())) {
    el.textContent = '—';
    return;
  }
  const parts = new Intl.DateTimeFormat('en-CA', {
    timeZone: 'Asia/Shanghai',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
  }).formatToParts(d);
  const g = (t) => parts.find((p) => p.type === t)?.value ?? '';
  const y = g('year');
  const mo = g('month');
  const day = g('day');
  const lang = getLang();
  el.textContent =
    lang === 'zh'
      ? `${y}年${mo}月${day}日`
      : `${y}-${mo}-${day} (BJT)`;
  el.setAttribute('datetime', `${y}-${mo}-${day}`);
}

  set('proj-m-max', n ? String(maxItems) : '—');

function playFavClickFx(btn, didFavorite) {
  btn.classList.remove('atlas-fav-btn--fx');
  void btn.offsetWidth;
  btn.classList.add('atlas-fav-btn--fx');
  window.setTimeout(function () {
    btn.classList.remove('atlas-fav-btn--fx');
  }, 900);
  if (!didFavorite) return;
  var inner = btn.querySelector('.atlas-fav-btn-inner');
  if (!inner) return;
  var n = 10;
  for (var i = 0; i < n; i++) {
    (function (idx) {
      var sp = document.createElement('span');
      sp.className = 'atlas-fav-spark';
      sp.setAttribute('aria-hidden', 'true');
      sp.textContent = '\u2665';
      var deg = (360 * idx) / n + (Math.random() * 24 - 12);
      var dist = 18 + Math.random() * 16;
      var rad = (deg * Math.PI) / 180;
      sp.style.setProperty('--tx', Math.cos(rad) * dist + 'px');
      sp.style.setProperty('--ty', Math.sin(rad) * dist + 'px');
      inner.appendChild(sp);
      requestAnimationFrame(function () {
        sp.classList.add('atlas-fav-spark--go');
      });
      window.setTimeout(function () {
        if (sp.parentNode) sp.parentNode.removeChild(sp);
      }, 800);
    })(i);
  }
  var starChars = ['\u2605', '\u2726', '\u22C6', '\u2606', '\u2727', '\u2736'];
  var nStars = 20;
  for (var s = 0; s < nStars; s++) {
    (function (idx) {
      var st = document.createElement('span');
      st.className = 'atlas-fav-star';
      st.setAttribute('aria-hidden', 'true');
      st.textContent = starChars[idx % starChars.length];
      st.style.setProperty('--x0', Math.random() * 22 - 11 + 'px');
      st.style.setProperty('--drift', (Math.random() * 40 - 20) + 'px');
      st.style.setProperty('--fall', 72 + Math.random() * 58 + 'px');
      st.style.setProperty('--swing', (Math.random() * 60 - 30) + 'deg');
      st.style.setProperty('--delay', idx * 0.032 + Math.random() * 0.1 + 's');
      inner.appendChild(st);
      requestAnimationFrame(function () {
        st.classList.add('atlas-fav-star--fall');
      });
      window.setTimeout(function () {
        if (st.parentNode) st.parentNode.removeChild(st);
      }, 1500);
    })(s);
  }
}

function copyStringToClipboard(str) {
  if (typeof navigator !== 'undefined' && navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(str);
  }
  return new Promise((resolve, reject) => {
    try {
      const ta = document.createElement('textarea');
      ta.value = str;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      resolve();
    } catch (e) {
      reject(e);
    }
  });
}

      void copyBtn.offsetWidth;
      copyBtn.classList.add('atlas-copy-btn--flash');
      if (copyFlashT) clearTimeout(copyFlashT);
      copyFlashT = window.setTimeout(() => {
        copyBtn.classList.remove('atlas-copy-btn--flash');
        copyFlashT = 0;
      }, copyFlashMs);
      copyBtn.setAttribute('title', pack.copy_copied);
      setTimeout(() => {
        if (pack.copy_url_title) copyBtn.setAttribute('title', pack.copy_url_title);

    };

})();

(function initMascotLightbox() {
  const openBtn = document.getElementById('atlas-hero-mascot-open');
  const box = document.getElementById('mascot-lightbox');
  const closeBtn = document.getElementById('mascot-lightbox-close');
  if (!openBtn || !box || !closeBtn) return;

  function open() {
    box.removeAttribute('hidden');
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }
  function close() {
    box.setAttribute('hidden', '');
    document.body.style.overflow = '';
    try { openBtn.focus(); } catch (e) { /* ignore */ }
  }

  openBtn.addEventListener('click', function (e) {
    e.preventDefault();
    open();
  });
  closeBtn.addEventListener('click', function () { close(); });
  box.addEventListener('click', function (e) {
    if (e.target === box) close();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && !box.hasAttribute('hidden')) close();
  });
})();

  updateLangButtons();
  applyStaticI18n();
  void refreshJournalRecommendTeaser();
})();

(function initStaleStatusBanner() {
  var STALE_MS = 28 * 60 * 60 * 1000;
  var bar = document.createElement('div');
  bar.id = 'atlas-stale-banner';
  bar.hidden = true;
  bar.setAttribute('role', 'status');
  bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#6b2d2f;color:#fff;padding:10px 14px;font-size:13px;text-align:center;font-family:system-ui,-apple-system,sans-serif;';
  document.body.appendChild(bar);
  fetch('/status.json', { cache: 'no-store' })
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (j) {
      if (!j || !j.generated_at) return;
      var t = Date.parse(j.generated_at);
      if (isNaN(t)) return;
      if (Date.now() - t <= STALE_MS) return;
      bar.hidden = false;
      var lang = typeof getLang === 'function' ? getLang() : 'zh';
      bar.textContent = lang === 'en'
        ? 'Site build may be stale (last generate > ~28h). Check cron or deploy.'
        : '本站生成时间已超过约 28 小时，请检查定时任务或部署是否正常。';
    })
    .catch(function () { /* offline or no status */ });
})();

syncAtlasMetrics();
</script>

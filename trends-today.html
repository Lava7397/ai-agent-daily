<style>
:root {
  --bg: #080c14;
  --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(255,255,255,0.06);
  --text: #e8e6e3;
  --text-dim: #8b8d92;
  --text-muted: #5c5e62;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.14);
  --c-coral: #ff5a3c;
  --c-teal: #00d4aa;
  --c-violet: #7c3aed;
  --c-amber: #f59e0b;
  --c-pink: #ec4899;

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.6}
.tt-shell{max-width:1200px;margin:0 auto;padding:0 24px}
.tt-nav{position:sticky;top:0;z-index:100;background:rgba(8,12,20,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px}
.tt-nav-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;height:52px}
.tt-nav a{color:var(--text-dim);text-decoration:none;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;font-weight:500;transition:color 0.2s}
.tt-nav a:hover{color:var(--text)}
.tt-nav-brand{font-family:ui-monospace,"Cascadia Code","SF Mono",monospace;font-size:11px;color:var(--text-muted);letter-spacing:1px}
.tt-hero{padding:48px 0 32px}
.tt-hero h1{font-size:clamp(36px,6vw,64px);font-weight:800;letter-spacing:-0.03em;line-height:1.05;color:var(--text);margin-bottom:8px}
.tt-hero .tt-sub{font-size:14px;color:var(--text-dim);letter-spacing:0.5px}
.tt-stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin-bottom:48px;border-radius:8px;overflow:hidden}
.tt-stat-card{background:var(--surface);padding:20px 24px;text-align:center}
.tt-stat-card .tt-stat-num{font-size:32px;font-weight:700;letter-spacing:-0.02em;line-height:1;margin-bottom:4px}
.tt-stat-card .tt-stat-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim)}
.tt-stat-card:nth-child(1) .tt-stat-num{color:var(--c-coral)}
.tt-stat-card:nth-child(2) .tt-stat-num{color:var(--c-teal)}
.tt-stat-card:nth-child(3) .tt-stat-num{color:var(--c-violet)}
.tt-grid{display:grid;gap:1px;background:var(--border);border-radius:8px;overflow:hidden;margin-bottom:48px}
.tt-section{background:var(--surface);padding:0}
.tt-section-header{display:flex;align-items:center;gap:12px;padding:20px 24px;border-bottom:1px solid var(--border)}
.tt-section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tt-section-dot--ai{background:var(--c-coral)}
.tt-section-dot--energy{background:var(--c-teal)}
.tt-section-dot--longevity{background:var(--c-violet)}
.tt-section-dot--robotics{background:var(--c-amber)}
.tt-section-dot--bci{background:var(--c-pink)}
.tt-section-header h2{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.01em}
.tt-section-header .tt-dir-en{font-size:12px;color:var(--text-muted);font-weight:400;margin-left:4px}
.tt-paper{display:grid;grid-template-columns:1fr auto;gap:16px;padding:20px 24px;border-bottom:1px solid var(--border);transition:background 0.2s;align-items:start}
.tt-paper:last-child{border-bottom:none}
.tt-paper:hover{background:var(--surface-hover)}
.tt-paper-main{min-width:0}
.tt-paper-title{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:6px;letter-spacing:-0.01em}
.tt-paper-title a{color:var(--text);text-decoration:none;transition:color 0.2s}
.tt-paper-title a:hover{color:var(--c-coral)}
.tt-paper-summary{font-size:12px;color:var(--text-dim);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.tt-paper-meta{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:6px;padding-top:2px}
.tt-source{font-family:ui-monospace,monospace;font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);color:var(--text-dim);white-space:nowrap}
.tt-source--arxiv{border-color:rgba(255,90,60,0.25);color:var(--c-coral)}
.tt-source--rss{border-color:rgba(0,212,170,0.25);color:var(--c-teal)}
.tt-paper-date{font-size:10px;color:var(--text-muted);white-space:nowrap}
.tt-lang{display:flex;align-items:center;gap:6px;margin-left:24px}
.tt-lang button{background:transparent;border:1px solid var(--border);cursor:pointer;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);padding:4px 10px;border-radius:4px;transition:all 0.2s;font-family:ui-monospace,monospace}
.tt-lang button:hover{color:var(--text);border-color:var(--border-strong)}
.tt-lang button.active{color:var(--text);border-color:var(--c-coral);background:rgba(255,90,60,0.1)}
.tt-footer{text-align:center;padding:40px 24px;border-top:1px solid var(--border);color:var(--text-muted);font-size:11px;letter-spacing:0.5px;margin-top:48px}
.tt-footer a{color:var(--text-dim)}
@media(max-width:768px){
  .tt-hero h1{font-size:32px}
  .tt-stats-bar{grid-template-columns:1fr}
  .tt-paper{grid-template-columns:1fr}
  .tt-paper-meta{flex-direction:row;align-items:center}
  .tt-section-header{padding:16px 20px}
  .tt-paper{padding:16px 20px}
}
@media(max-width:480px){
  .tt-shell{padding:0 16px}
  .tt-hero{padding:32px 0 24px}
}
</style>
</head>

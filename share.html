<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="color-scheme" content="light">
<title>分享</title>
<style>
*{box-sizing:border-box;margin:0}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:linear-gradient(180deg,#ebe6dc 0%,#f5f0e8 32%);
  color:#2c2c2c;
  -webkit-font-smoothing:antialiased;
  line-height:1.6;
  min-height:100vh;
  padding:20px 16px 32px;
}
main{max-width:22rem;margin:0 auto}
.card{
  background:#fff;
  border:1px solid rgba(100,80,60,0.12);
  border-radius:14px;
  padding:22px 20px 20px;
  box-shadow:0 4px 24px rgba(50,40,30,0.07);
}
.kicker{
  display:inline-block;
  font-size:10px;
  font-weight:600;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:#4a6080;
  background:rgba(74,96,128,0.1);
  padding:4px 10px;
  border-radius:4px;
  margin-bottom:12px
}
h1{
  font-size:1.05rem;
  font-weight:650;
  color:#141414;
  word-break:break-word;
  line-height:1.45;
  margin-bottom:12px
}
.summary{
  font-size:14px;
  color:#3d3d3d;
  margin-bottom:16px;
  white-space:pre-wrap;
  word-break:break-word
}
a.site{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  flex:1 1 0;
  min-width:0;
  font-size:14px;
  font-weight:500;
  color:#fff;
  background:#4a6080;
  text-decoration:none;
  padding:10px 12px;
  border-radius:8px
}
a.site:hover{background:#3d5468}
a.site:focus-visible{outline:2px solid #1e3a2f;outline-offset:2px}
.card-actions{
  display:flex;
  flex-direction:row;
  flex-wrap:wrap;
  align-items:stretch;
  gap:8px;
  width:100%;
  margin-top:4px
}
button.copy{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  flex:0 0 auto;
  white-space:nowrap;
  font-size:14px;
  font-weight:500;
  color:#2c2c2c;
  background:#f0ebe3;
  border:1px solid rgba(100,80,60,0.22);
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-family:inherit;
  -webkit-tap-highlight-color:transparent
}
button.copy:hover{background:#e5dfd4}
button.copy:focus-visible{outline:2px solid #4a6080;outline-offset:2px}
button.copy[hidden]{display:none}
.err{color:#6a3a3a;font-size:14px;margin-top:12px}
#t.loading{color:#8a8a8a;font-weight:500}
</style>
</head>
<body>
<main id="root">
  <article class="card">
    <p class="kicker">本期推荐</p>
    <h1 class="loading" id="t">加载中…</h1>
    <p class="summary" id="s"></p>
    <div class="card-actions">
    <a class="site" id="go" href="https://lava7397.com" rel="noopener">访问：AI Agent 期刊</a>
    <button type="button" class="copy" id="copySum" hidden aria-label="仅复制下方摘要到剪贴板">复制摘要</button>
    </div>
    <p class="err" id="e" hidden></p>
  </article>
</main>
<script>
(function () {
  var KEY_ORDER = ["research", "github", "models", "community"];
  var tEl = document.getElementById("t");
  var sEl = document.getElementById("s");
  var eEl = document.getElementById("e");
  var goEl = document.getElementById("go");
  var copyBtn = document.getElementById("copySum");
  var lastShareText = "";
  if (!tEl || !sEl || !eEl) return;
  if (goEl) goEl.href = "https://lava7397.com";

  function setCopyable(summaryOnly) {
    lastShareText = typeof summaryOnly === "string" ? summaryOnly : "";
    if (copyBtn) {
      if (lastShareText) {
        copyBtn.removeAttribute("hidden");
        if (copyBtn.textContent === "已复制") copyBtn.textContent = "复制摘要";
      } else {
        copyBtn.setAttribute("hidden", "");
      }
    }
  }

  function showErr(msg) {
    tEl.classList.remove("loading");
    tEl.textContent = "无法显示";
    sEl.setAttribute("hidden", "");
    sEl.textContent = "";
    eEl.removeAttribute("hidden");
    eEl.textContent = msg;
    setCopyable("");
  }
  function fill(title, sum) {
    tEl.classList.remove("loading");
    tEl.textContent = title || "本期推荐";
    var raw = String(sum != null ? sum : "");
    sEl.textContent = raw;
    var sTrim = raw.trim();
    if (!sTrim) {
      sEl.setAttribute("hidden", "");
      sEl.textContent = "";
    } else {
      sEl.removeAttribute("hidden");
    }
    document.title = (title || "本期推荐") + " — LavaAgent";
    setCopyable(sTrim);
  }

  if (copyBtn) {
    copyBtn.addEventListener("click", function () {
      var text = lastShareText;
      if (!text) return;
      var label = "复制摘要";
      function done() {
        copyBtn.textContent = "已复制";
        setTimeout(function () { copyBtn.textContent = label; }, 2000);
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done).catch(fallback);
      } else {
        fallback();
      }
      function fallback() {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.cssText = "position:fixed;left:-9999px;top:0";
        document.body.appendChild(ta);
        ta.select();
        try {
          if (document.execCommand("copy")) done();
        } catch (e1) {}
        document.body.removeChild(ta);
      }
    });
  }
  function bytesLatin1ToUtf8(bin) {
    if (typeof TextDecoder !== "undefined") {
      var u8 = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i) & 255;
      return new TextDecoder("utf-8").decode(u8);
    }
    var pct = "";
    for (var j = 0; j < bin.length; j++) {
      pct += "%" + ("00" + (bin.charCodeAt(j) & 255).toString(16)).slice(-2);
    }
    return decodeURIComponent(pct);
  }
  function getLegacyB64() {
    var d = "";
    try {
      if (window.URLSearchParams) d = new URLSearchParams(window.location.search).get("d") || "";
      else {
        var m = /[?&]d=([^&]*)/.exec(window.location.search || "");
        d = m ? decodeURIComponent(m[1].replace(/\+/g, " ")) : "";
      }
    } catch (e) { d = ""; }
    if (d) return d;
    try { return (location.hash || "").replace(/^#/, ""); } catch (e2) { return ""; }
  }
  function decodeB64Fragment(h) {
    if (typeof atob === "undefined") throw new Error("atob");
    var p = h.replace(/-/g, "+").replace(/_/g, "/");
    var pad = p.length % 4 ? 4 - (p.length % 4) : 0;
    for (var k0 = 0; k0 < pad; k0++) p += "=";
    return JSON.parse(bytesLatin1ToUtf8(atob(p)));
  }

  (async function run() {
    var q;
    try { q = new URLSearchParams(window.location.search); } catch (e) { q = new URLSearchParams(""); }
    var k = q.get("k") || "";
    var sStr = q.get("s");
    var iStr = q.get("i");

    if (k && /^\d{4}-\d{2}-\d{2}$/.test(k) && sStr !== null && sStr !== "" && iStr !== null && iStr !== "") {
      var si = parseInt(sStr, 10);
      var ii = parseInt(iStr, 10);
      if (isNaN(si) || isNaN(ii) || si < 0 || si > 3) {
        showErr("分享参数无效。");
        return;
      }
      try {
        var res = await fetch("/issue-data/" + encodeURIComponent(k) + ".json", { cache: "no-cache" });
        if (!res.ok) { showErr("未找到该期数据，请用最新日刊的「分享」重试。"); return; }
        var J = await res.json();
        var sk = KEY_ORDER[si];
        var row = J.sections && J.sections[sk] && J.sections[sk][ii];
        if (!row) { showErr("未找到该条内容，可能链接已过期。"); return; }
        fill(String(row.t || ""), String(row.s || ""));
      } catch (x) {
        showErr("加载失败，请检查网络后重试。");
      }
      return;
    }

    var b64 = getLegacyB64();
    if (b64) {
      try {
        var o = decodeB64Fragment(b64);
        fill(String(o.t != null ? o.t : ""), String(o.s != null ? o.s : ""));
      } catch (e2) {
        showErr("旧版长链接已损坏，请从日刊重新点「分享」。");
      }
      return;
    }

    tEl.classList.remove("loading");
    tEl.textContent = "无分享内容";
    sEl.setAttribute("hidden", "");
    eEl.removeAttribute("hidden");
    eEl.textContent = "请从日刊内「分享」打开，或使用上方按钮访问主站。";
    setCopyable("");
  })();
})();
</script>
</body>
</html>
